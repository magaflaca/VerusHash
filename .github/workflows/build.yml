name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    name: ${{ matrix.artifact }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: linux-x86_64
            image: quay.io/pypa/manylinux2014_x86_64
            platform: linux/amd64
          - artifact: linux-aarch64
            image: quay.io/pypa/manylinux2014_aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        if: matrix.platform == 'linux/arm64'
      - shell: bash
        run: |
          docker run --rm --platform ${{ matrix.platform }} -v "$PWD:/src" -w /src ${{ matrix.image }} /bin/bash -lc '
            PYTHON=$(find /opt/python -path "*/bin/python" | sort | tail -n 1)
            BINDIR=$(dirname "$PYTHON")
            "$PYTHON" -m pip install --quiet cmake
            "$BINDIR/cmake" -S . -B build -DCMAKE_BUILD_TYPE=Release -DVERUSHASH_PORTABLE_ONLY=ON
            "$BINDIR/cmake" --build build --config Release --parallel
            "$BINDIR/cmake" --install build --config Release --prefix dist/${{ matrix.artifact }}
          '
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  macos:
    name: macos-universal2
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DVERUSHASH_PORTABLE_ONLY=ON -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
      - run: cmake --build build --config Release --parallel
      - run: cmake --install build --config Release --prefix dist/macos-universal2
      - run: tar -czf macos-universal2.tar.gz -C dist macos-universal2
      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal2
          path: macos-universal2.tar.gz

  windows:
    name: windows-${{ matrix.name }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x64
            arch: x64
          - name: arm64
            arch: ARM64
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - run: cmake -S . -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }} -DVERUSHASH_PORTABLE_ONLY=ON
      - run: cmake --build build --config Release --parallel
      - run: cmake --install build --config Release --prefix dist/windows-${{ matrix.name }}
      - shell: pwsh
        run: Compress-Archive -Path dist/windows-${{ matrix.name }}/* -DestinationPath windows-${{ matrix.name }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.name }}
          path: windows-${{ matrix.name }}.zip

  release:
    name: release
    runs-on: ubuntu-24.04
    needs:
      - linux
      - macos
      - windows
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
