name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-ubuntu-22.04-x64
            runner: ubuntu-22.04
          - name: linux-ubuntu-24.04-x64
            runner: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build --config Release --parallel
      - run: cmake --install build --config Release --prefix dist/${{ matrix.name }}
      - run: tar -czf ${{ matrix.name }}.tar.gz -C dist ${{ matrix.name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  linux-cross:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-aarch64
            packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            toolchain: cmake/toolchains/linux-aarch64.cmake
          - name: linux-armv7
            packages: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            toolchain: cmake/toolchains/linux-armv7.cmake
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - run: sudo apt-get update
      - run: sudo apt-get install -y ${{ matrix.packages }}
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=${{ matrix.toolchain }}
      - run: cmake --build build --config Release --parallel
      - run: cmake --install build --config Release --prefix dist/${{ matrix.name }}
      - run: tar -czf ${{ matrix.name }}.tar.gz -C dist ${{ matrix.name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  windows:
    name: windows-${{ matrix.platform_name }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: x64
            platform: x64
          - platform_name: x86
            platform: Win32
          - platform_name: arm64
            platform: ARM64
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - run: cmake -S . -B build -G "Visual Studio 17 2022" -A ${{ matrix.platform }}
      - run: cmake --build build --config Release --parallel
      - run: cmake --install build --config Release --prefix dist/windows-${{ matrix.platform_name }}
      - shell: pwsh
        run: Compress-Archive -Path dist/windows-${{ matrix.platform_name }}/* -DestinationPath windows-${{ matrix.platform_name }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.platform_name }}
          path: windows-${{ matrix.platform_name }}.zip

  release:
    name: release
    runs-on: ubuntu-24.04
    needs:
      - linux-native
      - linux-cross
      - windows
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
