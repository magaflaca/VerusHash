name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    name: ${{ matrix.artifact }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: linux-x86_64
            image: quay.io/pypa/manylinux2014_x86_64
            platform: linux/amd64
          - artifact: linux-aarch64
            image: quay.io/pypa/manylinux2014_aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        if: matrix.platform == 'linux/arm64'
      - name: Build in manylinux
        shell: bash
        env:
          ARTIFACT: ${{ matrix.artifact }}
          IMAGE: ${{ matrix.image }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          rm -rf build dist "${ARTIFACT}.tar.gz"
          docker run --rm --platform "${PLATFORM}" -e ARTIFACT="${ARTIFACT}" -v "${PWD}:/work" -w /work "${IMAGE}" /bin/bash -lc '
          set -euo pipefail
          PYBIN="$(for p in /opt/python/cp*/bin/python3 /opt/python/cp*/bin/python; do if [ -x "$p" ]; then echo "$p"; fi; done | sort | tail -n 1)"
          test -x "${PYBIN}"
          "${PYBIN}" -m pip install --quiet --upgrade pip
          "${PYBIN}" -m pip install --quiet cmake ninja
          export PATH="$(dirname "${PYBIN}"):${PATH}"
          command -v cmake
          command -v ninja
          rm -rf build "dist/${ARTIFACT}"
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DVERUSHASH_PORTABLE_ONLY=ON
          cmake --build build --config Release --parallel
          cmake --install build --config Release --prefix "dist/${ARTIFACT}"
          test -d "dist/${ARTIFACT}"
          tar -czf "${ARTIFACT}.tar.gz" -C dist "${ARTIFACT}"
          test -f "${ARTIFACT}.tar.gz"
          '
          test -f "${ARTIFACT}.tar.gz"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  macos:
    name: macos-universal2
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DVERUSHASH_PORTABLE_ONLY=ON -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Install
        run: cmake --install build --config Release --prefix dist/macos-universal2
      - name: Package
        run: tar -czf macos-universal2.tar.gz -C dist macos-universal2
      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal2
          path: macos-universal2.tar.gz

  windows:
    name: windows-${{ matrix.name }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86
            arch: Win32
          - name: x64
            arch: x64
          - name: arm64
            arch: ARM64
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }} -DVERUSHASH_PORTABLE_ONLY=ON
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Install
        run: cmake --install build --config Release --prefix dist/windows-${{ matrix.name }}
      - name: Package
        shell: pwsh
        run: Compress-Archive -Path dist/windows-${{ matrix.name }}/* -DestinationPath windows-${{ matrix.name }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.name }}
          path: windows-${{ matrix.name }}.zip

  release:
    name: release
    runs-on: ubuntu-24.04
    needs:
      - linux
      - macos
      - windows
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
